# PCHub - Docker Compose Configuration
version: "3.9"

services:
  # ===== PCHub Admin Web (Blazor Server) =====
  pchub-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pchub-admin
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Database__Provider=${DB_PROVIDER:-SQLite}
      - Database__SQLite=Data Source=/app/data/PCHub.db
      - Database__SqlServer=${SQLSERVER_CONNECTION:-}
      - Database__PostgreSQL=${POSTGRESQL_CONNECTION:-}
      - Database__MySQL=${MYSQL_CONNECTION:-}
      - ChatBot__Provider=${CHATBOT_PROVIDER:-LocalRule}
      - ChatBot__ApiKey=${CHATBOT_API_KEY:-}
      - Storage__Provider=${STORAGE_PROVIDER:-FileSystem}
      - Storage__BasePath=/app/uploads
    volumes:
      - pchub-data:/app/data
      - pchub-uploads:/app/uploads
    networks:
      - pchub-network

  # ===== PostgreSQL (Optional - uncomment to use) =====
