  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - pchub-network

  # ===== MySQL (Optional - uncomment to use) =====
  # mysql:
  #   image: mysql:8.4
