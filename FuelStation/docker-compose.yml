# ============================================
# FUELSTATION - Docker Compose
# ============================================

services:
  # ---- FuelStation App ----
  fuelstation:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fuelstation-app
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # Database - pilih salah satu
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/FuelStation.db
      - Database__Provider=SQLite
      # ChatBot
      - ChatBot__Provider=OpenAI
      - ChatBot__Model=gpt-4o
      - ChatBot__ApiKey=${CHATBOT_API_KEY:-}
      # Simulator
      - Simulator__Enabled=false
      - IoTSimulator__Enabled=false
    volumes:
      - fuelstation-data:/app/data
      - fuelstation-uploads:/app/uploads
      - fuelstation-receipts:/app/receipts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - fuelstation-net

