  #     - fuelstation-net

  # ---- MinIO (Optional) ----
  # Uncomment untuk storage S3-compatible local
  # minio:
  #   image: minio/minio:latest
  #   container_name: fuelstation-minio
  #   command: server /data --console-address ":9001"
