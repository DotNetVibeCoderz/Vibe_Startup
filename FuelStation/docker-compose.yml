  #     - MYSQL_USER=fuelstation
  #     - MYSQL_PASSWORD=${DB_PASSWORD:-FuelStation123!}
  #   volumes:
  #     - mysql-data:/var/lib/mysql
  #   ports:
  #     - "3306:3306"
