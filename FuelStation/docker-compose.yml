  # ---- MySQL (Optional) ----
  # Uncomment untuk menggunakan MySQL sebagai database
  # mysql:
  #   image: mysql:8.0
  #   container_name: fuelstation-mysql
  #   environment:
  #     - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-FuelStation123!}
